name: Farmwelt
version: ${version}
main: de.minecraftgilde.farmwelt.FarmweltPlugin
api-version: "1.21"
author: CFPlusPlus
folia-supported: true
description: Farmwelt-System für den Minecraft-Gilde-Server.
dependencies:
  server:
    BetterRTP:
      load: BEFORE
      required: false
      join-classpath: false
    GriefPrevention:
      load: BEFORE
      required: false
      join-classpath: true
permissions:
  farmwelt.use:
    description: Darf /farmwelt verwenden.
    default: true
  farmwelt.bypass:
    description: Wird vom Ressourcenmonitor ignoriert.
    default: op
  farmwelt.notify:
    description: Erhält Moderator-Benachrichtigungen.
    default: op
  farmwelt.admin:
    description: Für spätere Admin-Funktionen vorgesehen.
    default: op
