farmworlds:
  overworld:
    enabled: true
    display-name: "Farmwelt"
    icon: GRASS_BLOCK
    slot: 11
    lore:
      - "Normale Farmwelt"
      - "Fuer Holz, Sand, Erde und weitere Ressourcen"
    teleport:
      type: command
      sender: player
      command: "betterrtp:rtp world Farmwelt"

  nether:
    enabled: true
    display-name: "Netherfarm"
    icon: NETHERRACK
    slot: 13
    lore:
      - "Farmwelt fuer Nether-Ressourcen"
    teleport:
      type: command
      sender: player
      command: "betterrtp:rtp world Netherfarm"

  end:
    enabled: true
    display-name: "Endfarm"
    icon: END_STONE
    slot: 15
    lore:
      - "Farmwelt fuer End-Ressourcen"
    teleport:
      type: command
      sender: player
      command: "betterrtp:rtp world Endfarm"

resource-monitor:
  enabled: true
  mode: audit

  monitored-worlds:
    - world
    - world_nether
    - world_the_end

  ignored-worlds:
    - farmwelt
    - netherfarm
    - endfarm

  bypass-permission: farmwelt.bypass
  notify-permission: farmwelt.notify

  claim-protection:
    enabled: true
    provider: GriefPrevention
    skip-inside-claims: true
    fail-mode: disable-monitor
    ignore-height: true

  audit:
    notify-staff: true
    log-to-console: true
    staff-message: "&e[Farmwelt-Audit] &f{player} hat &c{block} &fin &7{world} &fbei &7{x} {y} {z} &fabgebaut. Kategorie: &7{category}"
    log-cooldown-seconds: 10

  world-rules:
    world:
      type: overworld
      sea-level: 63
      surface-resources:
        - OAK_LOG
        - SPRUCE_LOG
        - BIRCH_LOG
        - JUNGLE_LOG
        - ACACIA_LOG
        - DARK_OAK_LOG
        - MANGROVE_LOG
        - CHERRY_LOG
        - SAND
        - RED_SAND
        - GRAVEL
        - CLAY
      underground-resources:
        - COAL_ORE
        - DEEPSLATE_COAL_ORE
        - IRON_ORE
        - DEEPSLATE_IRON_ORE
        - COPPER_ORE
        - DEEPSLATE_COPPER_ORE
        - GOLD_ORE
        - DEEPSLATE_GOLD_ORE
        - REDSTONE_ORE
        - DEEPSLATE_REDSTONE_ORE
        - LAPIS_ORE
        - DEEPSLATE_LAPIS_ORE
        - DIAMOND_ORE
        - DEEPSLATE_DIAMOND_ORE
        - EMERALD_ORE
        - DEEPSLATE_EMERALD_ORE

    world_nether:
      type: nether
      resources:
        - NETHER_QUARTZ_ORE
        - NETHER_GOLD_ORE
        - ANCIENT_DEBRIS
        - GLOWSTONE
        - SOUL_SAND
        - SOUL_SOIL
        - BASALT
        - BLACKSTONE

    world_the_end:
      type: end
      resources:
        - END_STONE
        - CHORUS_FLOWER
        - CHORUS_PLANT
        - OBSIDIAN
