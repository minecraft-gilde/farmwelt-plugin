farmworlds:
  overworld:
    enabled: true
    display-name: "Farmwelt"
    icon: GRASS_BLOCK
    slot: 11
    world: farmwelt
    x: 0.5
    y: 80
    z: 0.5
    yaw: 0
    pitch: 0
    lore:
      - "Normale Farmwelt"
      - "Für Holz, Sand, Erde und weitere Ressourcen"

  nether:
    enabled: true
    display-name: "Netherfarm"
    icon: NETHERRACK
    slot: 13
    world: netherfarm
    x: 0.5
    y: 80
    z: 0.5
    yaw: 0
    pitch: 0
    lore:
      - "Farmwelt für Nether-Ressourcen"

  end:
    enabled: true
    display-name: "Endfarm"
    icon: END_STONE
    slot: 15
    world: endfarm
    x: 0.5
    y: 80
    z: 0.5
    yaw: 0
    pitch: 0
    lore:
      - "Farmwelt für End-Ressourcen"

resource-monitor:
  enabled: true
  mode: audit

  monitored-worlds:
    - world
    - world_nether
    - world_the_end

  ignored-worlds:
    - farmwelt
    - netherfarm
    - endfarm

  bypass-permission: farmwelt.bypass
  notify-permission: farmwelt.notify

  sea-level:
    world: 63
    world_nether: 32
    world_the_end: 50

  violation-window-seconds: 600

  surface-resources:
    - OAK_LOG
    - SPRUCE_LOG
    - BIRCH_LOG
    - JUNGLE_LOG
    - ACACIA_LOG
    - DARK_OAK_LOG
    - MANGROVE_LOG
    - CHERRY_LOG
    - SAND
    - RED_SAND
    - GRAVEL
    - CLAY

  underground-resources:
    - COAL_ORE
    - DEEPSLATE_COAL_ORE
    - IRON_ORE
    - DEEPSLATE_IRON_ORE
    - COPPER_ORE
    - DEEPSLATE_COPPER_ORE
    - GOLD_ORE
    - DEEPSLATE_GOLD_ORE
    - REDSTONE_ORE
    - DEEPSLATE_REDSTONE_ORE
    - LAPIS_ORE
    - DEEPSLATE_LAPIS_ORE
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
    - ANCIENT_DEBRIS

  actions:
    warning:
      after-blocks: 5
      message: "Bitte nutze für Ressourcen die Farmwelten mit /farmwelt."

    cancel-break:
      after-blocks: 8
      message: "Dieser Ressourcenabbau ist in der Hauptwelt nicht erlaubt. Nutze /farmwelt."

    notify-staff:
      after-blocks: 10
      message: "{player} baut Ressourcen in {world} bei {x} {y} {z} ab."

    kick:
      after-blocks: 18
      reason: "Bitte nutze für Ressourcen die Farmwelten: /farmwelt"

    jail:
      after-blocks: 30
      command: "jail {player} farmwelt"
