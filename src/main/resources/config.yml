farmworlds:
  overworld:
    enabled: true
    display-name: "Farmwelt"
    icon: GRASS_BLOCK
    slot: 11
    lore:
      - "Normale Farmwelt"
      - "Für Holz, Sand, Erde und weitere Ressourcen"
    teleport:
      type: command
      sender: player
      command: "betterrtp:rtp world Farmwelt"

  nether:
    enabled: true
    display-name: "Netherfarm"
    icon: NETHERRACK
    slot: 13
    lore:
      - "Farmwelt für Nether-Ressourcen"
    teleport:
      type: command
      sender: player
      command: "betterrtp:rtp world Netherfarm"

  end:
    enabled: true
    display-name: "Endfarm"
    icon: END_STONE
    slot: 15
    lore:
      - "Farmwelt für End-Ressourcen"
    teleport:
      type: command
      sender: player
      command: "betterrtp:rtp world Endfarm"

resource-monitor:
  # Schaltet den Ressourcenmonitor insgesamt ein oder aus.
  enabled: true

  # Betriebsmodus des Ressourcenmonitors:
  # audit  = nur beobachten, Audit loggen und optional Staff informieren; keine Spielerwarnung.
  # warn   = wie audit, zusätzlich Verstöße zählen und Spieler/Staff nach actions-Schwellen warnen.
  # enforce = wie warn, zusätzlich kann Ressourcenabbau ab der cancel-break-Schwelle blockiert werden.
  mode: audit

  # Nur in diesen Welten prüft der Ressourcenmonitor überhaupt auf Ressourcenabbau.
  monitored-worlds:
    - world
    - world_nether
    - world_the_end

  # Diese Welten bleiben immer ausgenommen, auch wenn sie versehentlich oben eingetragen werden.
  ignored-worlds:
    - farmwelt
    - netherfarm
    - endfarm

  # Spieler mit dieser Permission werden vom Ressourcenmonitor ignoriert.
  bypass-permission: farmwelt.bypass

  # Spieler mit dieser Permission erhalten Staff-Benachrichtigungen.
  notify-permission: farmwelt.notify

  # Zeitraum, in dem relevante Abbauten pro Spieler gezählt werden.
  # Nach Ablauf startet der Zähler beim nächsten Treffer wieder bei 1.
  violation-window-seconds: 600

  claim-protection:
    # Wenn aktiv, wird Ressourcenabbau innerhalb von Claims ignoriert.
    enabled: true
    provider: GriefPrevention
    skip-inside-claims: true

    # disable-monitor = Monitor bleibt sicherheitshalber aus, wenn der Claim-Provider fehlt.
    fail-mode: disable-monitor
    ignore-height: true

  audit:
    # Audit ist das reine Beobachtungs-Logging. Im Modus audit werden keine Spielerwarnungen gesendet.
    notify-staff: true
    log-to-console: true
    staff-message: "&e[Farmwelt-Audit] &f{player} hat &c{block} &fin &7{world} &fbei &7{x} {y} {z} &fabgebaut. Kategorie: &7{category}"
    log-cooldown-seconds: 10

  actions:
    # Actions sind einzelne Eskalationsstufen. Sie werden nur ausgeführt, wenn der mode sie erlaubt.
    # Beispiel: warning.enabled=true warnt Spieler erst bei mode=warn oder mode=enforce, nicht bei mode=audit.
    warning:
      enabled: true
      after-blocks: 5
      cooldown-seconds: 60
      message: "&eBitte nutze für Ressourcen die Farmwelten mit &6/farmwelt&e."

    # Staff-Notify unter actions nutzt den Violation-Zähler und die after-blocks-Schwelle.
    # Das ist getrennt vom audit.notify-staff, das nur das reine Audit-Verhalten steuert.
    notify-staff:
      enabled: true
      after-blocks: 10
      cooldown-seconds: 60
      message: "&e[Farmwelt] &f{player} baut Ressourcen in &7{world} &fbei &7{x} {y} {z} &fab. Verstöße im Zeitfenster: &c{count}&f. Kategorie: &7{category}"

    cancel-break:
      enabled: true
      after-blocks: 15
      cooldown-seconds: 10
      message: "&cDer Ressourcenabbau in dieser Welt ist jetzt blockiert. Bitte nutze die Farmwelten mit &e/farmwelt&c."
      actionbar-message: "&cRessourcenabbau blockiert! Nutze &e/farmwelt&c."

    # Optionale letzte Stufe nach tatsächlich blockierten Abbauversuchen.
    # Wichtig: Jail nutzt NICHT den normalen Verstöße-Zähler, sondern nur blocked-count.
    # blocked-count steigt nur, wenn enforce aktiv ist und der Blockabbau wirklich abgebrochen wurde.
    jail:
      # Hauptschalter für diese Eskalationsstufe.
      # false = es wird weder Staff informiert noch ein Befehl ausgeführt.
      enabled: false

      # Mögliche Werte:
      # disabled        = keine Jail-Eskalation, auch keine Staff-Meldung.
      # notify-only     = nur Staff informieren, kein Befehl. Empfohlener sicherer Modus.
      # execute-command = konfigurierten Befehl über die Konsole ausführen.
      mode: notify-only

      # Anzahl blockierter Abbauversuche, ab der die Jail-Eskalation geprüft wird.
      # Zählt nur Versuche nach aktiver Blockierung durch cancel-break.
      after-blocked-attempts: 20

      # Mindestabstand zwischen zwei Jail-Aktionen für denselben Spieler.
      # Gilt auch für notify-only, damit Staff-Meldungen nicht gespammt werden.
      cooldown-minutes: 20

      # true = pro violation-window-seconds maximal eine Jail-Aktion.
      # false = nach Ablauf des cooldown-minutes kann im selben Fenster erneut ausgelöst werden.
      execute-once-per-window: true

      # Wird nur bei mode: execute-command genutzt.
      # Ohne führenden Slash eintragen; der Befehl wird als Konsole ausgeführt.
      # Platzhalter: {player}, {uuid}, {world}, {x}, {y}, {z}, {block}, {category}, {count}, {blocked-count}, {window-seconds}
      command: "jail {player} mgpd 30min"

      # true = Spieler mit notify-permission erhalten bei Auslösung eine Meldung.
      notify-staff: true

      # Staff-Meldung für notify-only und execute-command.
      staff-message: "&c[Farmwelt] &f{player} hat trotz Blockierung weiter Ressourcenabbau versucht. Blockierte Versuche: &c{blocked-count}&f. Jail wäre jetzt möglich."

      # Spielernachricht nach erfolgreich ausgeführtem Befehl.
      # Wird bei notify-only nicht gesendet.
      player-message: "&cDu wurdest wegen wiederholtem Ressourcenabbau in der Hauptwelt ins Gefängnis gesetzt."

  world-rules:
